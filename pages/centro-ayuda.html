  <main>
    <section class="page-container page-container--narrow">
      <h1 style="text-align:center;">Comunicate con nosotros</h1>

      <form id="formContacto" class="formulario-contacto">
        <fieldset>
          <legend>Información Personal</legend>

          <div class="form-group">
            <label for="nombre">Nombre:</label>
            <input type="text" id="nombre" name="nombre" placeholder="Nombre completo" required>
          </div>

          <div class="form-group">
            <label for="edad">Edad:</label>
            <input type="number" id="edad" name="edad" placeholder="Edad" required>
          </div>

          <div class="form-group">
            <label for="email">Email:</label>
            <input type="email" id="email" name="email" placeholder="tu@email.com" required>
          </div>
        </fieldset>

        <fieldset>
          <legend>Motivo del Mensaje</legend>

          <div class="form-group">
            <label for="mensaje">Mensaje:</label>
            <textarea id="mensaje" name="mensaje" required rows="5"></textarea>
          </div>

          <div class="form-group">
            <label for="archivo">Adjuntar Archivo (Opcional):</label>
            <input type="file" id="archivo" name="archivo">
          </div>
        </fieldset>

        <div class="form-actions">
          <button type="submit" class="btn-primary form-enviar">Enviar Mensaje</button>
        </div>

        <p id="respuesta"></p>
      </form>
    </section>
  </main>
