<!DOCTYPE html>
<html lang="es">

<head>
    <meta charset="UTF-8">
    <title>Login Administrador</title>
</head>

<body>

    <h1>Acceso Administrador</h1>

    <form id="formLogin">

        <label>Usuario</label>
        <br>
        <input
            type="text"
            id="usuario"
            required
        >

        <br><br>

        <label>Contraseña</label>
        <br>
        <input
            type="password"
            id="password"
            required
        >

        <br><br>

        <button type="submit">
            Ingresar
        </button>

    </form>

    <p id="respuesta"></p>

    <script src="../js/login.js"></script>

</body>

</html>
